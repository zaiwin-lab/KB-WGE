<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KOBIS Website Growth Engine</title>
  <meta name="description" content="Build First. Pay Later. Go Smarter. KOBIS creates a professional website preview for your business before you pay." />
  <meta name="theme-color" content="#07090f" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
/* ==========================================================================
   KOBIS Website Growth Engine — Design System
   "Build First. Sell Later. Grow Forever."
   A single, cohesive token system powering the admin engine, the client
   dashboard, and the public hub. Preview business sites are themed separately.
   ========================================================================== */

/* ----------------------------------- Tokens ----------------------------- */
:root {
  /* Brand surfaces — deep midnight with engineered depth */
  --ink-900: #07090f;
  --ink-850: #0a0d15;
  --ink-800: #0d111c;
  --ink-750: #11162370;
  --ink-700: #161c2d;
  --ink-600: #1d2538;
  --line: #232b40;
  --line-soft: #1a2033;

  /* Text */
  --tx-hi: #f4f7ff;
  --tx: #c5cde0;
  --tx-mid: #8d97b3;
  --tx-lo: #5e6884;

  /* Signature palette */
  --grow: #00e5a0;          /* primary — growth / activation */
  --grow-deep: #00b582;
  --grow-glow: #00e5a033;
  --violet: #7c5cff;        /* secondary — intelligence / AI */
  --violet-glow: #7c5cff2e;
  --amber: #ffb547;         /* credits / money */
  --amber-glow: #ffb5472e;
  --rose: #ff5d73;          /* risk / churn */
  --sky: #4cc9ff;           /* analytics */

  /* Semantic */
  --ok: var(--grow);
  --warn: var(--amber);
  --bad: var(--rose);

  /* Radius / shadow / motion */
  --r-xs: 8px; --r-sm: 12px; --r-md: 16px; --r-lg: 22px; --r-xl: 30px;
  --sh-1: 0 1px 2px rgba(0,0,0,.4);
  --sh-2: 0 10px 30px -12px rgba(0,0,0,.6);
  --sh-3: 0 24px 60px -20px rgba(0,0,0,.7);
  --glow-grow: 0 0 0 1px var(--grow-glow), 0 12px 40px -16px var(--grow-glow);
  --ease: cubic-bezier(.22,.61,.36,1);
  --ease-out: cubic-bezier(.16,1,.3,1);

  --font-display: "Sora", system-ui, sans-serif;
  --font-body: "Inter", system-ui, -apple-system, sans-serif;
  --maxw: 1280px;
}

/* ----------------------------------- Reset ------------------------------ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--ink-900);
  color: var(--tx);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}
img { max-width: 100%; display: block; }
button, input, select, textarea { font: inherit; color: inherit; }
button { cursor: pointer; border: none; background: none; }
a { color: inherit; text-decoration: none; }
h1,h2,h3,h4 { font-family: var(--font-display); color: var(--tx-hi); line-height: 1.1; letter-spacing: -.02em; font-weight: 700; }
::selection { background: var(--grow); color: var(--ink-900); }

/* App ambient background — engineered gradient mesh */
.app-bg {
  position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background:
    radial-gradient(60% 50% at 12% -5%, var(--violet-glow), transparent 60%),
    radial-gradient(55% 45% at 100% 0%, var(--grow-glow), transparent 55%),
    radial-gradient(50% 60% at 50% 120%, #1a224033, transparent 60%),
    var(--ink-900);
}
.app-bg::after {
  content: ""; position: absolute; inset: 0;
  background-image: radial-gradient(circle at 1px 1px, #ffffff05 1px, transparent 0);
  background-size: 40px 40px;
  mask-image: radial-gradient(70% 70% at 50% 30%, #000 30%, transparent 100%);
}

/* ----------------------------------- Layout ----------------------------- */
.shell { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
.main { min-width: 0; }
.view { padding: 32px clamp(20px, 4vw, 48px) 80px; max-width: var(--maxw); margin: 0 auto; animation: viewIn .5s var(--ease-out) both; }
@keyframes viewIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

/* ----------------------------------- Sidebar ---------------------------- */
.sidebar {
  position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column;
  background: linear-gradient(180deg, var(--ink-850), var(--ink-900));
  border-right: 1px solid var(--line-soft); padding: 22px 16px; gap: 6px;
}
.brand { display: flex; align-items: center; gap: 12px; padding: 6px 10px 20px; }
.brand-mark {
  width: 38px; height: 38px; border-radius: 11px; display: grid; place-items: center;
  background: linear-gradient(140deg, var(--grow), var(--grow-deep));
  color: var(--ink-900); font-family: var(--font-display); font-weight: 800; font-size: 19px;
  box-shadow: 0 8px 24px -8px var(--grow-glow), inset 0 1px 0 #ffffff66;
}
.brand-name { font-family: var(--font-display); font-weight: 700; color: var(--tx-hi); font-size: 16px; letter-spacing: -.01em; }
.brand-sub { font-size: 11px; color: var(--tx-lo); letter-spacing: .14em; text-transform: uppercase; }

.nav-group-label { font-size: 10.5px; letter-spacing: .18em; text-transform: uppercase; color: var(--tx-lo); padding: 14px 12px 6px; }
.nav-item {
  display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: var(--r-sm);
  color: var(--tx-mid); font-size: 14px; font-weight: 500; transition: all .2s var(--ease); position: relative;
}
.nav-item svg { width: 18px; height: 18px; opacity: .8; flex: none; }
.nav-item:hover { background: var(--ink-700); color: var(--tx-hi); }
.nav-item.active { background: linear-gradient(100deg, var(--grow-glow), transparent); color: var(--tx-hi); }
.nav-item.active::before { content: ""; position: absolute; left: -16px; top: 50%; transform: translateY(-50%); width: 3px; height: 22px; border-radius: 0 3px 3px 0; background: var(--grow); box-shadow: 0 0 12px var(--grow); }
.nav-item .nav-badge { margin-left: auto; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; background: var(--ink-600); color: var(--tx); }
.sidebar-foot { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--line-soft); }

/* Role switcher (RBAC — Rec 9) */
.role-switch { display: flex; gap: 4px; background: var(--ink-800); border: 1px solid var(--line); border-radius: 10px; padding: 4px; margin-bottom: 10px; }
.role-switch button { flex: 1; font-size: 11.5px; font-weight: 600; padding: 6px; border-radius: 7px; color: var(--tx-mid); transition: all .2s; }
.role-switch button.on { background: var(--ink-600); color: var(--tx-hi); box-shadow: var(--sh-1); }
.user-chip { display: flex; align-items: center; gap: 10px; padding: 8px; }
.avatar { width: 34px; height: 34px; border-radius: 10px; display: grid; place-items: center; font-weight: 700; font-size: 13px; color: var(--ink-900); background: linear-gradient(140deg, var(--violet), #a98bff); }

/* ----------------------------------- Topbar ----------------------------- */
.topbar { display: flex; align-items: center; gap: 16px; padding: 20px clamp(20px,4vw,48px) 0; max-width: var(--maxw); margin: 0 auto; }
.crumbs { font-size: 13px; color: var(--tx-lo); }
.crumbs b { color: var(--tx); font-weight: 600; }
.topbar-spacer { flex: 1; }

/* ----------------------------------- Headings --------------------------- */
.page-head { margin-bottom: 26px; }
.page-title { font-size: clamp(24px, 3.4vw, 34px); }
.page-sub { color: var(--tx-mid); margin-top: 6px; max-width: 60ch; font-size: 14.5px; }
.eyebrow { display: inline-flex; align-items: center; gap: 7px; font-size: 11.5px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--grow); margin-bottom: 12px; }
.eyebrow::before { content: ""; width: 18px; height: 2px; background: var(--grow); border-radius: 2px; }

/* ----------------------------------- Cards ------------------------------ */
.card {
  background: linear-gradient(180deg, var(--ink-800), var(--ink-850));
  border: 1px solid var(--line); border-radius: var(--r-md); padding: 22px;
  box-shadow: var(--sh-2); position: relative;
}
.card-pad-lg { padding: 26px; }
.card-head { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
.card-head h3 { font-size: 16px; }
.card-head .sub { font-size: 12.5px; color: var(--tx-lo); }

.grid { display: grid; gap: 18px; }
.g-2 { grid-template-columns: repeat(2, 1fr); }
.g-3 { grid-template-columns: repeat(3, 1fr); }
.g-4 { grid-template-columns: repeat(4, 1fr); }
.span-2 { grid-column: span 2; }

/* ----------------------------------- Metric / KPI ----------------------- */
.kpi { padding: 20px; overflow: hidden; }
.kpi-label { font-size: 12.5px; color: var(--tx-mid); display: flex; align-items: center; gap: 8px; }
.kpi-icon { width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center; }
.kpi-value { font-family: var(--font-display); font-size: 30px; font-weight: 700; color: var(--tx-hi); margin-top: 12px; letter-spacing: -.02em; }
.kpi-value small { font-size: 15px; color: var(--tx-mid); font-weight: 500; }
.kpi-foot { margin-top: 8px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
.delta-up { color: var(--grow); } .delta-down { color: var(--rose); }
.spark { margin-top: 14px; height: 38px; width: 100%; }

/* tint helpers */
.t-grow { background: var(--grow-glow); color: var(--grow); }
.t-violet { background: var(--violet-glow); color: var(--violet); }
.t-amber { background: var(--amber-glow); color: var(--amber); }
.t-sky { background: #4cc9ff26; color: var(--sky); }
.t-rose { background: #ff5d7326; color: var(--rose); }

/* ----------------------------------- Buttons ---------------------------- */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600; font-size: 14px; padding: 11px 18px; border-radius: var(--r-sm); transition: all .2s var(--ease); white-space: nowrap; }
.btn svg { width: 17px; height: 17px; }
.btn-primary { background: linear-gradient(135deg, var(--grow), var(--grow-deep)); color: var(--ink-900); box-shadow: 0 10px 26px -10px var(--grow-glow), inset 0 1px 0 #ffffff66; }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 16px 34px -12px var(--grow-glow), inset 0 1px 0 #ffffff66; }
.btn-ghost { background: var(--ink-700); color: var(--tx-hi); border: 1px solid var(--line); }
.btn-ghost:hover { background: var(--ink-600); border-color: #2c3650; }
.btn-violet { background: linear-gradient(135deg, var(--violet), #6344e0); color: #fff; box-shadow: 0 10px 26px -10px var(--violet-glow); }
.btn-violet:hover { transform: translateY(-1px); }
.btn-wa { background: #25d366; color: #062e16; box-shadow: 0 10px 26px -12px #25d36666; }
.btn-wa:hover { transform: translateY(-1px); filter: brightness(1.05); }
.btn-sm { padding: 8px 13px; font-size: 13px; }
.btn-block { width: 100%; }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

/* ----------------------------------- Pills / badges --------------------- */
.pill { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 600; padding: 4px 10px; border-radius: 999px; border: 1px solid var(--line); background: var(--ink-700); color: var(--tx); }
.pill .dot { width: 6px; height: 6px; border-radius: 50%; }
.pill-grow { background: var(--grow-glow); color: var(--grow); border-color: transparent; }
.pill-violet { background: var(--violet-glow); color: #b6a4ff; border-color: transparent; }
.pill-amber { background: var(--amber-glow); color: var(--amber); border-color: transparent; }
.pill-sky { background: #4cc9ff20; color: var(--sky); border-color: transparent; }
.pill-rose { background: #ff5d7320; color: #ff8a99; border-color: transparent; }

/* ----------------------------------- Score ring ------------------------- */
.score-ring { --val: 0; width: 46px; height: 46px; border-radius: 50%; display: grid; place-items: center; position: relative; flex: none;
  background: conic-gradient(var(--ring-c, var(--grow)) calc(var(--val) * 1%), var(--ink-700) 0); }
.score-ring::before { content: ""; position: absolute; inset: 4px; border-radius: 50%; background: var(--ink-850); }
.score-ring span { position: relative; font-family: var(--font-display); font-weight: 700; font-size: 14px; color: var(--tx-hi); }

/* ----------------------------------- Pipeline (kanban) ------------------ */
.pipeline { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 14px; scroll-snap-type: x proximity; }
.pipe-col { flex: 0 0 282px; scroll-snap-align: start; background: var(--ink-850); border: 1px solid var(--line-soft); border-radius: var(--r-md); padding: 12px; display: flex; flex-direction: column; gap: 10px; min-height: 200px; }
.pipe-col-head { display: flex; align-items: center; gap: 8px; padding: 4px 6px 2px; }
.pipe-col-head .label { font-size: 12.5px; font-weight: 700; color: var(--tx-hi); }
.pipe-col-head .count { font-size: 11px; font-weight: 700; color: var(--tx-mid); background: var(--ink-700); padding: 1px 8px; border-radius: 999px; }
.pipe-col-bar { height: 3px; border-radius: 3px; margin: 0 6px; }
.lead-card { background: linear-gradient(180deg, var(--ink-800), var(--ink-850)); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 13px; cursor: pointer; transition: all .2s var(--ease); }
.lead-card:hover { border-color: #313c5a; transform: translateY(-2px); box-shadow: var(--sh-2); }
.lead-card .lc-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.lead-card .lc-name { font-weight: 700; color: var(--tx-hi); font-size: 13.5px; }
.lead-card .lc-cat { font-size: 11.5px; color: var(--tx-lo); margin-top: 2px; }
.lead-card .lc-meta { display: flex; gap: 8px; margin-top: 11px; flex-wrap: wrap; }
.lead-card .lc-tag { font-size: 10.5px; color: var(--tx-mid); display: flex; align-items: center; gap: 4px; }

/* ----------------------------------- Table ------------------------------ */
.tbl { width: 100%; border-collapse: collapse; font-size: 13.5px; }
.tbl th { text-align: left; font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--tx-lo); font-weight: 700; padding: 10px 14px; border-bottom: 1px solid var(--line); }
.tbl td { padding: 13px 14px; border-bottom: 1px solid var(--line-soft); color: var(--tx); vertical-align: middle; }
.tbl tr:last-child td { border-bottom: none; }
.tbl tbody tr { transition: background .15s; }
.tbl tbody tr:hover { background: #ffffff04; }
.tbl .num { font-variant-numeric: tabular-nums; font-family: var(--font-display); }

/* ----------------------------------- Forms ------------------------------ */
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12.5px; font-weight: 600; color: var(--tx); margin-bottom: 7px; }
.field .hint { font-size: 11.5px; color: var(--tx-lo); font-weight: 400; }
.input, .select, textarea.input {
  width: 100%; background: var(--ink-900); border: 1px solid var(--line); border-radius: var(--r-sm);
  padding: 11px 13px; color: var(--tx-hi); font-size: 14px; transition: all .2s; outline: none;
}
.input:focus, .select:focus, textarea.input:focus { border-color: var(--grow); box-shadow: 0 0 0 3px var(--grow-glow); }
.input::placeholder { color: var(--tx-lo); }
textarea.input { resize: vertical; min-height: 90px; line-height: 1.5; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* ----------------------------------- Modal ------------------------------ */
.modal-scrim { position: fixed; inset: 0; background: #04060bcc; backdrop-filter: blur(8px); z-index: 100; display: grid; place-items: center; padding: 20px; animation: fade .25s var(--ease); }
@keyframes fade { from { opacity: 0; } }
.modal { width: min(560px, 100%); max-height: 90vh; overflow-y: auto; background: linear-gradient(180deg, var(--ink-800), var(--ink-850)); border: 1px solid var(--line); border-radius: var(--r-lg); box-shadow: var(--sh-3); animation: pop .35s var(--ease-out); }
.modal-wide { width: min(820px, 100%); }
@keyframes pop { from { opacity: 0; transform: translateY(18px) scale(.97); } }
.modal-head { padding: 22px 24px; border-bottom: 1px solid var(--line-soft); display: flex; align-items: flex-start; gap: 14px; }
.modal-body { padding: 24px; }
.modal-foot { padding: 18px 24px; border-top: 1px solid var(--line-soft); display: flex; gap: 10px; justify-content: flex-end; background: #ffffff03; }
.modal-x { margin-left: auto; width: 32px; height: 32px; border-radius: 9px; display: grid; place-items: center; color: var(--tx-mid); background: var(--ink-700); }
.modal-x:hover { color: var(--tx-hi); background: var(--ink-600); }

/* ----------------------------------- Misc ------------------------------- */
.divider { height: 1px; background: var(--line-soft); margin: 18px 0; }
.row { display: flex; align-items: center; gap: 10px; }
.between { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.wrap { flex-wrap: wrap; }
.muted { color: var(--tx-mid); }
.dim { color: var(--tx-lo); }
.hi { color: var(--tx-hi); }
.mono { font-variant-numeric: tabular-nums; }
.stack { display: flex; flex-direction: column; }
.gap-6{gap:6px}.gap-8{gap:8px}.gap-10{gap:10px}.gap-14{gap:14px}.gap-18{gap:18px}
.mt-8{margin-top:8px}.mt-14{margin-top:14px}.mt-18{margin-top:18px}.mt-24{margin-top:24px}
.text-sm { font-size: 13px; } .text-xs { font-size: 11.5px; }
.fw-700 { font-weight: 700; } .fw-600 { font-weight: 600; }
.center { text-align: center; }
.toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 10px; }
.toast { background: var(--ink-700); border: 1px solid var(--line); border-left: 3px solid var(--grow); border-radius: var(--r-sm); padding: 13px 16px; box-shadow: var(--sh-3); display: flex; align-items: center; gap: 11px; min-width: 260px; animation: toastIn .4s var(--ease-out); }
.toast.violet { border-left-color: var(--violet); } .toast.amber { border-left-color: var(--amber); }
@keyframes toastIn { from { opacity: 0; transform: translateX(40px); } }

/* progress bar */
.bar { height: 7px; border-radius: 999px; background: var(--ink-700); overflow: hidden; }
.bar > i { display: block; height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--grow), var(--grow-deep)); transition: width .8s var(--ease-out); }

/* empty state */
.empty { text-align: center; padding: 50px 20px; color: var(--tx-lo); }
.empty svg { width: 42px; height: 42px; opacity: .4; margin-bottom: 14px; }

/* checklist (SOP) */
.sop-step { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--line-soft); }
.sop-step:last-child { border-bottom: none; }
.sop-day { flex: none; width: 54px; text-align: center; }
.sop-day .d { font-family: var(--font-display); font-weight: 700; font-size: 18px; color: var(--tx-hi); }
.sop-day .l { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--tx-lo); }
.sop-check { width: 22px; height: 22px; border-radius: 7px; border: 1.5px solid var(--line); flex: none; display: grid; place-items: center; transition: all .2s; cursor: pointer; }
.sop-check.done { background: var(--grow); border-color: var(--grow); }
.sop-check.done svg { color: var(--ink-900); }

/* responsive */
@media (max-width: 1080px) { .g-4 { grid-template-columns: repeat(2,1fr); } .g-3 { grid-template-columns: 1fr 1fr; } }
@media (max-width: 920px) {
  .shell { grid-template-columns: 1fr; }
  .sidebar { position: fixed; left: 0; top: 0; z-index: 90; transform: translateX(-100%); transition: transform .3s var(--ease); width: 260px; }
  .sidebar.open { transform: none; box-shadow: var(--sh-3); }
  .menu-btn { display: grid !important; }
  .scrim-nav { position: fixed; inset: 0; background: #04060b99; z-index: 89; }
}
@media (max-width: 720px) { .g-2,.g-3,.g-4 { grid-template-columns: 1fr; } .span-2 { grid-column: auto; } .field-row { grid-template-columns: 1fr; } }
.menu-btn { display: none; width: 40px; height: 40px; border-radius: 10px; place-items: center; background: var(--ink-700); border: 1px solid var(--line); color: var(--tx-hi); }

/* build-material upload UI (Add Prospect modal) */
.asset-row { display: flex; align-items: center; gap: 12px; }
.asset-btn { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; padding: 9px 14px; border-radius: var(--r-sm); background: var(--ink-700); border: 1px dashed var(--line); color: var(--tx-hi); cursor: pointer; transition: all .2s; width: fit-content; }
.asset-btn:hover { border-color: var(--grow); color: var(--grow); }
.asset-btn svg { width: 16px; height: 16px; }
.asset-logo { width: 44px; height: 44px; border-radius: 10px; overflow: hidden; background: var(--ink-900); border: 1px solid var(--line); flex: none; }
.asset-logo img { width: 100%; height: 100%; object-fit: contain; }
.asset-thumbs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.asset-thumb { width: 60px; height: 60px; border-radius: 9px; background-size: cover; background-position: center; border: 1px solid var(--line); position: relative; }
.asset-thumb button { position: absolute; top: -6px; right: -6px; width: 18px; height: 18px; border-radius: 50%; background: var(--rose); color: #fff; display: grid; place-items: center; }
.asset-thumb button svg { width: 11px; height: 11px; }

/* ==========================================================================
   Public surfaces — Launch Hub, themed business previews, activation popup,
   client portal, and admin detail extras.
   ========================================================================== */

/* ============================ LAUNCH HUB ================================= */
.lh-nav { position: sticky; top: 0; z-index: 40; display: flex; align-items: center; gap: 24px; padding: 16px clamp(20px,5vw,64px); background: #07090fcc; backdrop-filter: blur(14px); border-bottom: 1px solid var(--line-soft); }
.lh-nav .brand { padding: 0; }
.lh-nav-links { display: flex; gap: 26px; margin-left: auto; }
.lh-nav-links a { font-size: 14px; color: var(--tx-mid); font-weight: 500; transition: color .2s; }
.lh-nav-links a:hover { color: var(--tx-hi); }

function readImageResized(file, maxDim = 1280, quality = 0.72) {
  return new Promise((resolve, reject) => {
    if (!file || !file.type.startsWith("image/"))
      return reject(new Error("not an image"));
    const fr = new FileReader;
    fr.onerror = () => reject(fr.error);
    fr.onload = () => {
      const img = new Image;
      img.onerror = () => reject(new Error("bad image"));
      img.onload = () => {
        let { width: w, height: h } = img;
        if (w > maxDim || h > maxDim) {
          const r = Math.min(maxDim / w, maxDim / h);
          w = Math.round(w * r);
          h = Math.round(h * r);
        }
        const c = document.createElement("canvas");
        c.width = w;
        c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        const isPng = file.type === "image/png";
        resolve(c.toDataURL(isPng ? "image/png" : "image/jpeg", quality));
      };
      img.src = fr.result;
    };
    fr.readAsDataURL(file);
  });
}
async function readPdfText(file) {
  const out = { name: file?.name || "document.pdf", text: "", pages: 0 };
  if (!file)

    const WORKER = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs";
    const url = CDN;
    const pdfjs = await import(url);
    pdfjs.GlobalWorkerOptions.workerSrc = WORKER;
    const buf = await file.arrayBuffer();
    const doc = await pdfjs.getDocument({ data: buf }).promise;
    out.pages = doc.numPages;
    const parts = [];
    for (let i = 1;i <= Math.min(doc.numPages, 15); i++) {
      const page = await doc.getPage(i);
      const tc = await page.getTextContent();
      parts.push(tc.items.map((it) => it.str).join(" "));
    }
    out.text = parts.join(`
`).replace(/\s+\n/g, `
`).trim();
  } catch (e) {
    console.warn("[KOBIS] PDF text extraction unavailable:", e.message);
  }

}
function extractPricedItems(text, limit = 8) {

  const re = /(.{2,48}?)\s*(?:RM|rm|MYR)?\s*(\d{1,3}(?:\.\d{1,2})?)\b/;
  for (let raw of text.split(/\n|•|·|•/)) {
    const line = raw.trim();
    if (line.length < 3 || line.length > 60)
      continue;
    const m = line.match(/(RM|MYR|rm)\s?(\d{1,3}(?:\.\d{1,2})?)/);
    if (!m)

    const title = line.slice(0, m.index).replace(/[\.\-–:]+$/, "").trim();

var TABLES = ["prospects", "clients", "orders", "referrals", "credit_wallets", "waitlist", "team_members"];
function cfg() {
  const c = typeof window !== "undefined" && window.KOBIS_CONFIG || {};
  return { url: (c.supabaseUrl || "").replace(/\/$/, ""), key: c.supabaseAnonKey || "" };
}
function isConfigured() {
  const { url, key } = cfg();
  return !!(url && key && url.startsWith("http"));
}
function headers() {
  const { key } = cfg();
  return { apikey: key, Authorization: `Bearer ${key}`, "Content-Type": "application/json" };
}
async function hydrateAll() {
  if (!isConfigured())
    return null;
  const { url } = cfg();
  try {
    const out = {};
    await Promise.all(TABLES.map(async (t) => {
      const res = await fetch(`${url}/rest/v1/${t}?select=data`, { headers: headers() });
      if (!res.ok)
        throw new Error(`${t}: ${res.status}`);
      const rows = await res.json();
      out[t] = rows.map((r) => r.data);
    }));
    return out;
  } catch (e) {
    console.warn("[KOBIS] Supabase hydrate failed, using local data:", e.message);
    return null;
  }
}
async function pushAll(state) {
  if (!isConfigured())
    return;
  const { url } = cfg();
  await Promise.all(TABLES.map(async (t) => {
    const rows = state[t];
    if (!Array.isArray(rows) || !rows.length)
      return;
    try {
      const docs = rows.map((r) => ({ id: r.id, data: r, updated_at: new Date().toISOString() }));
      await fetch(`${url}/rest/v1/${t}?on_conflict=id`, {
        method: "POST",
        headers: { ...headers(), Prefer: "resolution=merge-duplicates,return=minimal" },
        body: JSON.stringify(docs)
      });
    } catch (e) {
      console.warn(`[KOBIS] Supabase push ${t} failed:`, e.message);
    }
  }));
}
async function upsertRows(table, rows) {
  if (!isConfigured() || !rows || !rows.length)
    return;
  const { url } = cfg();
  try {
    const docs = rows.map((r) => ({ id: r.id, data: r, updated_at: new Date().toISOString() }));
    await fetch(`${url}/rest/v1/${table}?on_conflict=id`, {
      method: "POST",
      headers: { ...headers(), Prefer: "resolution=merge-duplicates,return=minimal" },
      body: JSON.stringify(docs)
    });
  } catch (e) {
    console.warn(`[KOBIS] upsert ${table} failed:`, e.message);
  }
}
async function deleteRow(table, id) {
  if (!isConfigured() || !id)
    return;
  const { url } = cfg();
  try {
    await fetch(`${url}/rest/v1/${table}?id=eq.${encodeURIComponent(id)}`, { method: "DELETE", headers: headers() });
  } catch (e) {
    console.warn(`[KOBIS] delete ${table} failed:`, e.message);
  }
}
async function fetchBySlug(slug) {
  if (!isConfigured() || !slug)
    return null;
  const { url } = cfg();
  try {
    const res = await fetch(`${url}/rest/v1/prospects?data->>demo_slug=eq.${encodeURIComponent(slug)}&select=data&limit=1`, { headers: headers() });
    if (!res.ok)
      return null;
    const rows = await res.json();
    return rows[0]?.data || null;
  } catch {
    return null;
  }
}

var TABLES2 = ["prospects", "clients", "orders", "referrals", "credit_wallets", "waitlist", "team_members"];
async function boot() {
  const local = load();

    db = local || seed();

  }
  const snap = await hydrateAll();
  if (!snap) {
    db = local || seed();
    return db;
  }
  const fresh = seed();
  const dbHasData = TABLES2.some((t) => snap[t]?.length);
  if (!dbHasData) {
    db = local || fresh;
    db.role = local && local.role || "admin";
    pushAll(db);
    return db;
  }
  db = { role: local && local.role || "admin" };
  let heal = false;
  for (const t of TABLES2) {
    if (snap[t]?.length)
      db[t] = snap[t];
    else if (local?.[t]?.length) {
      db[t] = local[t];
      heal = true;
    } else if (t === "team_members") {
      db[t] = fresh.team_members;
      heal = true;
    } else
      db[t] = [];
  }
  if (heal)
    pushAll(db);
  return db;
}

var routes = [];
var notFound = () => '<div class="empty">Not found</div>';
function route(pattern, handler) {
  routes.push({ pattern, parts: pattern.split("/"), handler });
}
function setNotFound(fn) {
  notFound = fn;
}
function current() {
  const hash = (location.hash || "#/").slice(1) || "/";
  const [path] = hash.split("?");
  const segs = path.split("/").filter(Boolean);
  for (const r of routes) {
    const rp = r.parts.filter(Boolean);
    if (rp.length !== segs.length)
      continue;
    const params = {};
    let ok = true;
    for (let i = 0;i < rp.length; i++) {
      if (rp[i].startsWith(":"))
        params[rp[i].slice(1)] = decodeURIComponent(segs[i]);
      else if (rp[i] !== segs[i]) {
        ok = false;
        break;
      }
    }
    if (ok)
      return { handler: r.handler, params, path };
  }
  return { handler: notFound, params: {}, path };
}

  window.addEventListener("hashchange", fn);
}

function toast(msg, kind = "grow") {
  let wrap = document.querySelector(".toast-wrap");
  if (!wrap) {
    wrap = document.createElement("div");
    wrap.className = "toast-wrap";
    document.body.appendChild(wrap);
  }
  const el = document.createElement("div");
  el.className = "toast " + (kind === "grow" ? "" : kind);
  const span = document.createElement("span");
  span.textContent = msg;
  el.appendChild(span);

  setTimeout(() => {

function sparkline(points, color = "#00e5a0", h = 38, w = 220) {
  const max = Math.max(...points, 1), min = Math.min(...points, 0);
  const range = max - min || 1;
  const step = w / (points.length - 1);
  const pts = points.map((p, i) => [i * step, h - (p - min) / range * (h - 6) - 3]);
  const d = pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  const area = d + ` L ${w} ${h} L 0 ${h} Z`;
  const gid = "g" + Math.random().toString(36).slice(2, 7);
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${color}" stop-opacity=".28"/><stop offset="1" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#${gid})"/>
    <path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}
function metrics() {
  const prospects2 = prospects();
  const clients2 = clients();
  const orders2 = orders();
  const wallets2 = wallets();
  const referrals2 = referrals();
  const totalProspects = prospects2.length;
  const generated = prospects2.filter((p) => p.website_spec).length;
  const activations = clients2.length;
  const sentOrLater = prospects2.filter((p) => ["sent", "interested", "quoted", "activated", "renewal"].includes(p.status)).length;
  const conv = sentOrLater ? activations / sentOrLater : 0;
  const upsellRevenue = orders2.reduce((s, o) => s + (o.total_amount - o.activation_fee), 0);
  const activationRevenue = orders2.reduce((s, o) => s + o.activation_fee, 0);
  const renewalRevenue = clients2.length * PRICING.renewal;
  const creditsIssued = referrals2.filter((r) => r.activation_status === "confirmed").reduce((s, r) => s + r.reward_amount, 0);
  const cashRedeemed = wallets2.reduce((s, w) => s + w.cash_redeemed, 0);
  const totalRevenue = orders2.reduce((s, o) => s + o.total_amount, 0);
  const ltv = activations ? Math.round((totalRevenue + renewalRevenue) / activations) : 1400;
  return {
    totalProspects,
    generated,
    activations,
    conv,
    sentOrLater,
    upsellRevenue,
    activationRevenue,
    renewalRevenue,
    totalRevenue,
    creditsIssued,
    cashRedeemed,
    ltv,
    pipelineValue: prospects2.filter((p) => ["interested", "quoted"].includes(p.status)).length * PRICING.activation
  };
}

var host = null;
function openModal(html, { wide = false } = {}) {
  closeModal();
  host = document.createElement("div");
  host.className = "modal-scrim";
  host.innerHTML = `<div class="modal ${wide ? "modal-wide" : ""}" role="dialog" aria-modal="true">${html}</div>`;
  host.addEventListener("mousedown", (e) => {
    if (e.target === host)
      closeModal();
  });
  document.body.appendChild(host);
  document.addEventListener("keydown", esc2);
  return host.querySelector(".modal");
}
function closeModal() {
  if (host) {
    host.remove();
    host = null;
    document.removeEventListener("keydown", esc2);
  }
}
function esc2(e) {
  if (e.key === "Escape")
    closeModal();
}

function openAddModal() {
  const draft = { business_category: "cafe", followers: 5000, web_presence: "none", engagement: "high", affordability: "likely" };
  const assets = { logo: "", images: [], pdf: null, references: [] };
  let manualHtml = "";
  const m = openModal(addModalHtml(draft));
  const refresh = () => {
    const f = m.querySelector("#addForm");
    draft.business_category = f.business_category.value;
    draft.followers = Number(f.followers.value) || 0;
    draft.web_presence = f.web_presence.value;
    draft.engagement = f.engagement.value;
    draft.affordability = f.affordability.value;
    m.querySelector("#scorePreview").innerHTML = scorePreview(draft);
  };
  m.querySelectorAll("select,input[name=followers]").forEach((el) => el.addEventListener("input", refresh));
  const note = (sel, msg) => {
    const el = m.querySelector(sel);
    if (el)
      el.textContent = msg;
  };
  m.querySelector("#logoInput").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file)
      return;
    note("#logoNote", "processing…");
    try {
      assets.logo = await readImageResized(file, 400, 0.9);
      m.querySelector("#logoPrev").innerHTML = `<img src="${assets.logo}" alt="logo"/>`;
      note("#logoNote", file.name);
    } catch {
      note("#logoNote", "could not read image");
    }
  });
  m.querySelector("#photosInput").addEventListener("change", async (e) => {
    const files = [...e.target.files];
    if (!files.length)
      return;
    note("#photosNote", `processing ${files.length}…`);
    for (const file of files) {
      if (assets.images.length >= 10)
        break;
      try {
        const d = await readImageResized(file);
        assets.images.push(d);
      } catch {}
    }
    m.querySelector("#photosPrev").innerHTML = assets.images.map((d, i) => `<div class="asset-thumb" style="background-image:url('${d}')"><button data-rm="${i}">${icon("x")}</button></div>`).join("");
    note("#photosNote", `${assets.images.length} photo(s) ready`);
    m.querySelectorAll("[data-rm]").forEach((b) => b.addEventListener("click", () => {
      assets.images.splice(Number(b.dataset.rm), 1);
      m.querySelector("#photosInput").dispatchEvent(new Event("change"));
    }));
  });
  m.querySelector("#pdfInput").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file)
      return;
    note("#pdfNote", "reading PDF…");

  });
  m.querySelector("#htmlInput").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file)
      return;
    note("#htmlNote", "reading file…");
    try {
      manualHtml = await file.text();
      note("#htmlNote", `${file.name} · ${(manualHtml.length / 1024).toFixed(0)} KB — will be used as the live preview`);
    } catch {
      note("#htmlNote", "could not read file");
    }
  });
  m.querySelector("#addForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const fd = Object.fromEntries(new FormData(e.target).entries());
    fd.followers = Number(fd.followers) || 0;
    assets.references = normalizeUrls(fd.reference_urls);
    delete fd.reference_urls;
    fd.assets = assets;
    const p = addProspect(fd);
    if (manualHtml)
      attachManualSite(p.id, manualHtml);
    closeModal();
    toast(`Added ${p.company_name}${manualHtml ? " · site uploaded" : " · scored " + p.score + "/100"}`, "grow");
    location.hash = "#/admin/prospect/" + p.id;
  });
  refresh();
}

function wire6(c) {
  document.getElementById("saveAnnounce")?.addEventListener("click", () => {
    updateClient(c.id, { announcement: document.getElementById("announceBox").value });
    toast("Announcement published", "amber");
  });
  document.getElementById("saveContact")?.addEventListener("click", () => {
    updateClient(c.id, { phone: document.getElementById("cPhone").value, email: document.getElementById("cEmail").value });
    toast("Contact details saved");
  });
  document.getElementById("addShot")?.addEventListener("click", () => {
    const url = prompt("Paste an image URL for your gallery:");
    if (url) {
      const g = [...c.gallery, url];
      updateClient(c.id, { gallery: g });
      toast("Image added to gallery", "violet");
    }
  });
  document.getElementById("copyRef")?.addEventListener("click", () => {
    navigator.clipboard?.writeText(document.getElementById("refLink").value);
    toast("Referral link copied", "grow");
  });
  document.getElementById("redeemBtn")?.addEventListener("click", () => {
    if (redeemCash(c.id))
      toast(`${RM(PRICING.referral.cashRedeemThreshold)} cash redemption requested`, "amber");
  });
  document.getElementById("savePromo")?.addEventListener("click", () => {
    const ends = document.getElementById("promoEnds").value;
    updateClient(c.id, { promo: {
      enabled: document.getElementById("promoOn").checked,
      headline: document.getElementById("promoHeadline").value.slice(0, 80),
      sub: document.getElementById("promoSub").value.slice(0, 120),
      endsAt: ends ? new Date(ends).toISOString() : ""
    } });
    toast("Promo published to your site", "amber");
  });
  document.getElementById("addNews")?.addEventListener("click", () => {
    const title = document.getElementById("newsTitle").value.trim();
    const body = document.getElementById("newsBody").value.trim();
    if (!title) {
      toast("Add a title first", "rose");
      return;
    }
    const news = [{ id: "news_" + Math.random().toString(36).slice(2, 9), title: title.slice(0, 120), body: body.slice(0, 4000), created_at: new Date().toISOString() }, ...c.news || []];
    updateClient(c.id, { news });
    toast("Post published", "violet");
  });
  document.querySelectorAll("[data-delnews]").forEach((b) => b.addEventListener("click", () => {
    updateClient(c.id, { news: (c.news || []).filter((n) => n.id !== b.dataset.delnews) });
    toast("Post deleted");
  }));
}

function wireShell() {

    if (!b)
      return;
    setRole(b.dataset.role);

  const scrim = document.getElementById("scrimNav");
  document.getElementById("menuBtn")?.addEventListener("click", () => {
    sb.classList.add("open");

  });

    sb.classList.remove("open");

function render() {
  const { handler, params, path } = current();
  handler({ params, path });
}

});
subscribe(() => {

});
